  { type:'Feature', geometry:{ type:'LineString', coordinates:[[80.4,45.1],[80.2,45.3],[80.0,45.4],[79.7,45.5]]}, properties:{name:'Приток 2'}},
  { type:'Feature', geometry:{ type:'LineString', coordinates:[[79.8,44.8],[79.6,45.0],[79.4,45.2],[79.2,45.4]]}, properties:{name:'Приток 3'}},
  { type:'Feature', geometry:{ type:'LineString', coordinates:[[79.5,44.9],[79.3,45.1],[79.1,45.3],[78.9,45.5]]}, properties:{name:'Приток 4'}},
  { type:'Feature', geometry:{ type:'LineString', coordinates:[[79.0,45.0],[78.8,45.2],[78.6,45.4],[78.4,45.6]]}, properties:{name:'Приток 5'}},
  { type:'Feature', geometry:{ type:'LineString', coordinates:[[78.5,45.3],[78.3,45.5],[78.1,45.7],[77.9,45.9]]}, properties:{name:'Приток 6'}},
  { type:'Feature', geometry:{ type:'LineString', coordinates:[[77.8,45.5],[77.6,45.7],[77.4,45.9],[77.2,46.05]]}, properties:{name:'Приток 7'}},
  { type:'Feature', geometry:{ type:'LineString', coordinates:[[77.0,45.5],[76.8,45.7],[76.5,45.9],[76.2,46.1]]}, properties:{name:'Приток 8'}},

]};

const HYDROPOSTS = { type:'FeatureCollection', features:[
  { type:'Feature', geometry:{ type:'Point', coordinates:[80.5556,45.5431]}, properties:{ name:'№43 р.Лепси — г.Лепси', desc:'Верхнее течение · горная зона'}},
  { type:'Feature', geometry:{ type:'Point', coordinates:[78.3292,46.2794]}, properties:{ name:'№44 р.Лепси — а.Толебаев', desc:'Среднее течение · степная зона'}}
]};

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
    sources: {
      satellite: {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        attribution: 'Esri World Imagery'
      },
      terrain: {
        type: 'raster-dem',
        tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
        tileSize: 256,
        maxzoom: 15,
        encoding: 'terrarium'
      },
      basin: { type:'geojson', data:{ type:'Feature', geometry:{ type:'Polygon', coordinates:[BASIN]}}},
      rivers: { type:'geojson', data: RIVERS },
      hydroposts: { type:'geojson', data: HYDROPOSTS }
    },
    layers: [
      { id:'satellite', type:'raster', source:'satellite' },
      { id:'basin-fill', type:'fill', source:'basin', paint:{ 'fill-color':'rgba(126,207,255,0.08)' }},
      { id:'basin-line', type:'line', source:'basin', paint:{ 'line-color':'#7ecfff', 'line-width':2.5, 'line-opacity':0.85, 'line-dasharray':[4,3] }},
      { id:'rivers', type:'line', source:'rivers', paint:{ 'line-color':'#4488ff', 'line-width':2.5, 'line-opacity':0.9 }},
      { id:'hp-glow', type:'circle', source:'hydroposts', paint:{ 'circle-radius':18, 'circle-color':'#FF3333', 'circle-opacity':0.2, 'circle-blur':0.8 }},
      { id:'hp-dot', type:'circle', source:'hydroposts', paint:{ 'circle-radius':9, 'circle-color':'#FF3333', 'circle-stroke-width':3, 'circle-stroke-color':'#ffffff' }},
      { id:'hp-label', type:'symbol', source:'hydroposts',
        layout:{ 'text-field':['get','name'], 'text-size':12, 'text-offset':[0,1.8], 'text-anchor':'top', 'text-font':['Open Sans Bold'] },
        paint:{ 'text-color':'#ffffff', 'text-halo-color':'#000', 'text-halo-width':2 }}
    ],
    terrain: { source:'terrain', exaggeration: 3 },
    sky: { 'sky-type':'atmosphere', 'sky-atmosphere-sun':[0,90], 'sky-atmosphere-sun-intensity':15 }
  },
  center: [78.5, 45.8],
  zoom: 7.5,
  pitch: 60,
  bearing: -20,
  maxPitch: 85,
  antialias: true
});

map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

const popup = new maplibregl.Popup({ offset:15, closeButton:false });
map.on('mouseenter', 'hp-dot', (e) => {
  map.getCanvas().style.cursor = 'pointer';
  const p = e.features[0].properties;
  popup.setLngLat(e.features[0].geometry.coordinates)
    .setHTML('<strong style="color:#FF3333">' + p.name + '</strong><br><small>' + p.desc + '</small>')
    .addTo(map);
});
map.on('mouseleave', 'hp-dot', () => { map.getCanvas().style.cursor = ''; popup.remove(); });

function updateExag(val) {
  document.getElementById('ev').textContent = val + 'x';
  map.setTerrain({ source:'terrain', exaggeration: parseFloat(val) });
}
function updatePitch(val) {
  document.getElementById('pv').textContent = val + '°';
  map.easeTo({ pitch: parseInt(val), duration: 300 });
}
function flyTo(lng, lat, zoom, pitch, bearing) {
  map.flyTo({ center:[lng,lat], zoom, pitch, bearing, duration:2500 });
}
</script>
